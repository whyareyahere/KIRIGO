<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRIGO - 24H</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #ff0000;
            --text-primary: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Экраны --- */
        #splash, #app, #upload, #final-timer {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
        }

        #splash { display: flex; z-index: 100; transition: opacity 1s; }

        /* --- Стили для таймера 24 часа --- */
        .countdown-title {
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--accent-color);
            margin-bottom: 20px;
            animation: blink 1.5s infinite;
        }

        #big-timer {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            letter-spacing: 5px;
        }

        .hands-small {
            width: 80px;
            fill: #fff;
            opacity: 0.3;
            margin-top: 40px;
        }

        /* --- Остальные стили (кратко) --- */
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.5); }
        .record-btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; background: transparent; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .inner { width: 50px; height: 50px; background: var(--accent-color); border-radius: 50%; transition: 0.3s; }
        .record-btn.active .inner { width: 30px; height: 30px; border-radius: 4px; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Сплэш -->
    <div id="splash">
        <svg style="width: 120px; fill: #fff; animation: pulse 2s infinite alternate;" viewBox="0 0 200 200">
            <path d="M100 20 L85 140 L65 175 L80 185 L100 160 L120 185 L135 175 L115 140 Z" />
        </svg>
        <h1 style="letter-spacing: 10px; margin-top: 20px;">키리고</h1>
    </div>

    <!-- Запись -->
    <div id="app" style="position: relative;">
        <video id="webcam" autoplay muted playsinline></video>
        <div style="position: absolute; bottom: 50px; text-align: center;">
            <button class="record-btn" id="rec-btn"><div class="inner"></div></button>
            <p style="font-size: 10px; margin-top: 10px; opacity: 0.5;">HOLD TO WISH</p>
        </div>
    </div>

    <!-- Загрузка -->
    <div id="upload">
        <p style="letter-spacing: 3px;">UPLOADING TO SYSTEM...</p>
    </div>

    <!-- Экран с финальным таймером (24 часа) -->
    <div id="final-timer">
        <p class="countdown-title">TIME UNTIL REALIZATION</p>
        <div id="big-timer">24:00:00</div>
        <svg class="hands-small" viewBox="0 0 200 200">
            <path d="M100 20 L85 140 L65 175 L80 185 L100 160 L120 185 L135 175 L115 140 Z" />
        </svg>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top: 50px; background: none; border: 1px solid #333; color: #333; font-size: 10px; cursor: pointer;">RESET SESSION</button>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        const upload = document.getElementById('upload');
        const finalTimer = document.getElementById('final-timer');
        const bigTimerText = document.getElementById('big-timer');
        const video = document.getElementById('webcam');
        const btn = document.getElementById('rec-btn');

        let isRec = false;

        // Проверка: есть ли уже запущенный таймер в памяти?
        function checkExistingWish() {
            const startTime = localStorage.getItem('kirigo_start');
            if (startTime) {
                splash.style.display = 'none';
                finalTimer.style.display = 'flex';
                runFinalCountdown(parseInt(startTime));
                return true;
            }
            return false;
        }

        async function init() {
            if (checkExistingWish()) return;

            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = s;
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.style.display = 'none'; app.style.display = 'flex'; }, 1000);
                }, 3000);
            } catch (e) { alert("Access denied"); }
        }

        function runFinalCountdown(startTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = (startTime + (24 * 60 * 60 * 1000)) - now;

                if (diff <= 0) {
                    bigTimerText.innerText = "00:00:00";
                    bigTimerText.style.color = "red";
                    return;
                }

                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                bigTimerText.innerText = 
                    `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        btn.onmousedown = () => {
            isRec = true;
            btn.classList.add('active');
        };

        window.onmouseup = () => {
            if(!isRec) return;
            isRec = false;
            btn.classList.remove('active');
            
            // Переход к загрузке
            app.style.display = 'none';
            upload.style.display = 'flex';

            setTimeout(() => {
                const start = Date.now();
                localStorage.setItem('kirigo_start', start);
                upload.style.display = 'none';
                finalTimer.style.display = 'flex';
                runFinalCountdown(start);
            }, 3000);
        };

        // Тач-события для телефонов
        btn.ontouchstart = (e) => { e.preventDefault(); btn.onmousedown(); };
        window.ontouchend = window.onmouseup;

        init();
    </script>
</body>
</html>
