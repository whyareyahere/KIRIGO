<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRIGO - 24H SYSTEM</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #ff0000;
            --text-primary: #ffffff;
        }

        /* Общие настройки для стабильности на всех устройствах */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* Универсальный контейнер для экранов */
        .screen {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            z-index: 10;
        }

        /* --- Сплэш-экран (Центрирование исправлено) --- */
        #splash { display: flex; z-index: 100; transition: opacity 0.8s; }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .hands-svg {
            width: 30vw;
            max-width: 150px;
            min-width: 100px;
            fill: #fff;
            animation: pulse 2s infinite alternate;
        }

        /* --- Камера и Запись --- */
        #app { background: #000; }

        #video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Видео всегда заполняет экран без искажений */
            filter: grayscale(1) brightness(0.4) contrast(1.1);
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10vh 0; /* Отступы зависят от высоты экрана */
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
        }

        /* --- Кнопка записи (Оптимизирована под тач) --- */
        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
        }

        .inner-dot {
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .record-btn.active .inner-dot {
            width: 35px;
            height: 35px;
            border-radius: 6px;
        }

        /* --- Финальный экран 24 часа --- */
        .countdown-wrapper {
            text-align: center;
            width: 90%;
        }

        .status-text {
            font-size: clamp(10px, 2vw, 14px);
            letter-spacing: 5px;
            color: var(--accent-color);
            margin-bottom: 2vh;
            animation: blink 1.5s infinite;
        }

        #big-timer {
            font-size: clamp(32px, 10vw, 70px); /* Шрифт подстраивается под экран */
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            letter-spacing: 2px;
        }

        /* Анимации */
        @keyframes pulse { from { opacity: 0.4; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    </style>
</head>
<body>

    <!-- 1. Сплэш -->
    <div id="splash" class="screen">
        <div class="logo-container">
            <svg class="hands-svg" viewBox="0 0 200 200">
                <path d="M100 20 L85 140 L65 175 L80 185 L100 160 L120 185 L135 175 L115 140 Z" />
            </svg>
            <h1 style="letter-spacing: 12px; font-size: 24px;">키리고</h1>
        </div>
    </div>

    <!-- 2. Основное приложение -->
    <div id="app" class="screen">
        <div id="video-wrapper">
            <video id="webcam" autoplay muted playsinline></video>
            <div class="ui-overlay">
                <div style="font-size: 12px; letter-spacing: 3px; color: red;">● SYSTEM ACTIVE</div>
                
                <div style="text-align: center;">
                    <button class="record-btn" id="rec-btn">
                        <div class="inner-dot"></div>
                    </button>
                    <p style="font-size: 9px; margin-top: 15px; opacity: 0.6; letter-spacing: 2px;">HOLD TO SEND WISH</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Экран отправки -->
    <div id="upload" class="screen">
        <p style="letter-spacing: 5px; font-size: 14px;">PROCESSING...</p>
    </div>

    <!-- 4. Финальный таймер 24 часа -->
    <div id="final-timer" class="screen">
        <div class="countdown-wrapper">
            <p class="status-text">REMAINING TIME</p>
            <div id="big-timer">24:00:00</div>
            <svg style="width: 60px; fill: #fff; opacity: 0.2; margin-top: 5vh;" viewBox="0 0 200 200">
                <path d="M100 20 L85 140 L65 175 L80 185 L100 160 L120 185 L135 175 L115 140 Z" />
            </svg>
        </div>
    </div>

    <script>
        const screens = {
            splash: document.getElementById('splash'),
            app: document.getElementById('app'),
            upload: document.getElementById('upload'),
            final: document.getElementById('final-timer')
        };
        const timerLabel = document.getElementById('big-timer');
        const video = document.getElementById('webcam');
        const btn = document.getElementById('rec-btn');

        let isRecording = false;

        // Инициализация и проверка сохраненного времени
        function init() {
            const savedStart = localStorage.getItem('kirigo_timestamp');
            if (savedStart) {
                showScreen('final');
                start24hCountdown(parseInt(savedStart));
            } else {
                setupCamera();
            }
        }

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                setTimeout(() => {
                    screens.splash.style.opacity = '0';
                    setTimeout(() => showScreen('app'), 800);
                }, 2500);
            } catch (err) {
                alert("Ошибка: Доступ к камере отклонен.");
            }
        }

        function showScreen(name) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            screens[name].style.display = 'flex';
        }

        function start24hCountdown(startTime) {
            setInterval(() => {
                const now = Date.now();
                const deadline = startTime + (24 * 60 * 60 * 1000);
                const diff = deadline - now;

                if (diff <= 0) {
                    timerLabel.innerText = "00:00:00";
                    timerLabel.style.color = "#ff0000";
                    return;
                }

                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);

                timerLabel.innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // Логика кнопки
        const startRec = () => {
            isRecording = true;
            btn.classList.add('active');
        };

        const stopRec = () => {
            if (!isRecording) return;
            isRecording = false;
            btn.classList.remove('active');
            
            showScreen('upload');
            
            setTimeout(() => {
                const now = Date.now();
                localStorage.setItem('kirigo_timestamp', now);
                showScreen('final');
                start24hCountdown(now);
            }, 2500);
        };

        // Поддержка ПК и мобильных
        btn.onmousedown = startRec;
        window.onmouseup = stopRec;
        btn.ontouchstart = (e) => { e.preventDefault(); startRec(); };
        window.ontouchend = stopRec;

        init();
    </script>
</body>
</html>
