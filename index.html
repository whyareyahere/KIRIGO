<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRIGO - 키리고</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #ff0000;
            --text-primary: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace; /* Тот самый "компьютерный" шрифт */
            overflow: hidden;
            height: 100vh;
        }

        /* --- Сплэш-экран --- */
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 100;
            transition: opacity 1.5s;
        }

        .hands-silhouette {
            width: 150px;
            height: 150px;
            fill: #fff;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.4));
            animation: pulse-glow 2s infinite alternate;
        }

        /* --- Приложение --- */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(60%) contrast(1.2) brightness(0.6);
        }

        /* Элементы поверх видео */
        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Таймер по центру */
            align-items: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        /* Стилизация отсчета как в сериале */
        #timer-container {
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #timer {
            font-size: 80px;
            font-weight: bold;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            letter-spacing: 5px;
        }

        .rec-label {
            color: var(--accent-color);
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 10px;
            animation: blink 0.8s infinite;
        }

        /* Кнопка записи снизу */
        .controls {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .record-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .inner-circle {
            width: 50px;
            height: 50px;
            background: var(--accent-color);
            border-radius: 50%;
            transition: 0.3s;
        }

        .record-btn.active .inner-circle {
            width: 30px;
            height: 30px;
            border-radius: 4px;
        }

        /* Анимации */
        @keyframes pulse-glow { from { opacity: 0.5; } to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0,0); }
        }

        .critical { animation: shake 0.1s infinite; color: var(--accent-color) !important; }

        /* Экран загрузки */
        #upload {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div style="text-align: center;">
            <svg class="hands-silhouette" viewBox="0 0 200 200">
                <path d="M100 20 L85 140 L65 175 L80 185 L100 160 L120 185 L135 175 L115 140 Z" />
            </svg>
            <h1 style="font-size: 2rem; letter-spacing: 10px; margin-top: 10px;">키리고</h1>
        </div>
    </div>

    <div id="app">
        <video id="webcam" autoplay muted playsinline></video>
        <div class="ui-overlay">
            
            <div id="timer-container">
                <div class="rec-label">● REC</div>
                <div id="timer">50.00</div>
            </div>

            <div class="controls">
                <button class="record-btn" id="rec-btn">
                    <div class="inner-circle"></div>
                </button>
                <p style="font-size: 9px; opacity: 0.5; letter-spacing: 2px;">HOLD TO WISH</p>
            </div>
        </div>
    </div>

    <div id="upload">
        <p style="letter-spacing: 5px;">SENDING DATA...</p>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        const video = document.getElementById('webcam');
        const btn = document.getElementById('rec-btn');
        const timerContainer = document.getElementById('timer-container');
        const timerText = document.getElementById('timer');
        const upload = document.getElementById('upload');

        let isRec = false;
        let count = 50.00;
        let itv;

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = s;
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.style.display = 'none'; app.style.display = 'flex'; }, 1000);
                }, 3000);
            } catch (e) { alert("Access denied"); }
        }

        function stop() {
            if(!isRec) return;
            isRec = false;
            clearInterval(itv);
            btn.classList.remove('active');
            app.style.display = 'none';
            upload.style.display = 'flex';
            setTimeout(() => { alert("WISH GRANTED."); location.reload(); }, 3000);
        }

        btn.onmousedown = () => {
            isRec = true;
            count = 50.00;
            btn.classList.add('active');
            timerContainer.style.opacity = '1';
            
            itv = setInterval(() => {
                count -= 0.01;
                if(count <= 0) {
                    count = 0;
                    stop();
                }
                
                // Форматируем до сотых долей
                timerText.innerText = count.toFixed(2);

                // Если осталось меньше 5 секунд — добавляем эффект тряски
                if(count < 5) {
                    timerText.classList.add('critical');
                }
            }, 10); // Обновление каждые 10мс для плавности
        };

        window.onmouseup = stop;
        btn.ontouchstart = (e) => { e.preventDefault(); btn.onmousedown(); };
        window.ontouchend = stop;

        init();
    </script>
</body>
</html>
