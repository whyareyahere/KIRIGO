<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRIGO - 키리고</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #e62e2e;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Сплэш-экран с руками как на фото --- */
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 100;
            transition: opacity 1.5s ease-in-out;
        }

        .splash-content { text-align: center; }

        /* Тот самый силуэт рук */
        .hands-silhouette {
            width: 180px;
            height: 180px;
            fill: #fff;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            margin-bottom: 10px;
            animation: pulse-glow 2s infinite alternate;
        }

        .title-kor {
            font-size: 3rem;
            letter-spacing: 1rem;
            font-weight: 200;
            margin-top: -10px;
        }

        /* --- Приложение --- */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        #video-container {
            flex-grow: 1;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(50%) brightness(0.7);
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent, rgba(0,0,0,0.8));
        }

        .rec-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0;
        }

        .red-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .inner-circle {
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            border-radius: 50%;
            transition: 0.3s;
        }

        .record-btn.active .inner-circle {
            width: 30px;
            height: 30px;
            border-radius: 5px;
        }

        #upload {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bar { width: 150px; height: 1px; background: #333; margin-top: 20px; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: #fff; }

        @keyframes pulse-glow {
            from { opacity: 0.7; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }
        @keyframes load { to { width: 100%; } }

        .animate-load { animation: load 3s ease-in-out forwards; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <!-- Точный силуэт рук из изображение.png -->
            <svg class="hands-silhouette" viewBox="0 0 200 200">
                <path d="M100 20 L85 140 L65 175 L80 185 L100 160 L120 185 L135 175 L115 140 Z" />
                <rect x="99" y="40" width="2" height="110" fill="#000" opacity="0.3" />
            </svg>
            <h1 class="title-kor">키리고</h1>
        </div>
    </div>

    <div id="app">
        <div id="video-container">
            <video id="webcam" autoplay muted playsinline></video>
            <div class="ui-overlay">
                <div class="rec-info" id="rec-box">
                    <div class="red-dot"></div>
                    <span id="timer">00:00</span>
                </div>
                <div style="text-align: center; margin-bottom: 20px;">
                    <button class="record-btn" id="rec-btn">
                        <div class="inner-circle"></div>
                    </button>
                    <p style="font-size: 9px; margin-top: 10px; letter-spacing: 2px; opacity: 0.5;">WISH RECORDING</p>
                </div>
            </div>
        </div>
    </div>

    <div id="upload">
        <p style="letter-spacing: 4px; font-size: 12px;">UPLOADING WISH...</p>
        <div class="bar"><div class="fill" id="fill"></div></div>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        const video = document.getElementById('webcam');
        const btn = document.getElementById('rec-btn');
        const recBox = document.getElementById('rec-box');
        const timer = document.getElementById('timer');
        const upload = document.getElementById('upload');
        const fill = document.getElementById('fill');

        let isRec = false;
        let count = 50;
        let itv;

        async function start() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = s;
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.style.display = 'none'; app.style.display = 'flex'; }, 1500);
                }, 3000);
            } catch (e) { alert("Нужен доступ к камере"); }
        }

        function stop() {
            if(!isRec) return;
            isRec = false;
            clearInterval(itv);
            btn.classList.remove('active');
            app.style.display = 'none';
            upload.style.display = 'flex';
            fill.classList.add('animate-load');
            setTimeout(() => { alert("ПРИНЯТО"); location.reload(); }, 3500);
        }

        btn.onmousedown = () => {
            isRec = true;
            count = 50;
            btn.classList.add('active');
            recBox.style.opacity = '1';
            itv = setInterval(() => {
                count--;
                timer.innerText = `00:${count.toString().padStart(2, '0')}`;
                if(count <= 0) stop();
            }, 1000);
        };

        window.onmouseup = stop;
        
        // Для телефонов
        btn.ontouchstart = (e) => { e.preventDefault(); btn.onmousedown(); };
        window.ontouchend = stop;

        start();
    </script>
</body>
</html>
