<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRIGO - 키리고</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #e62e2e;
            --text-primary: #ffffff;
            --text-secondary: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Splash Screen --- */
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 100;
            transition: opacity 1s ease-in-out;
        }

        .splash-content { text-align: center; animation: fadeIn 2s ease-in; }

        .hands-icon {
            width: 100px;
            height: 100px;
            stroke: var(--text-secondary);
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .title-kor {
            font-size: 3.5rem;
            letter-spacing: 0.8rem;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* --- Main App Container --- */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
            position: relative;
        }

        #video-container {
            flex-grow: 1;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(40%) contrast(1.1) brightness(0.8);
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 30%, transparent 70%, rgba(0,0,0,0.8));
        }

        /* --- UI Elements --- */
        .rec-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .red-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }

        .timer { font-variant-numeric: tabular-nums; font-weight: bold; }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .record-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .record-btn:active { transform: scale(0.9); }

        .inner-circle {
            width: 65px;
            height: 65px;
            background: var(--accent-color);
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .record-btn.active .inner-circle {
            width: 35px;
            height: 35px;
            border-radius: 8px;
        }

        /* --- Upload Screen --- */
        #upload {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .progress-bar {
            width: 200px;
            height: 2px;
            background: #222;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
        }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }
        @keyframes loading { to { width: 100%; } }

        .animate-load { animation: loading 3s ease-in-out forwards; }
    </style>
</head>
<body>

    <!-- Сплэш-экран -->
    <div id="splash">
        <div class="splash-content">
            <svg class="hands-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M30 80 Q30 50 45 40 T50 20 T55 40 T70 50 Q70 80 50 80 Z" />
                <path d="M40 80 L40 65 M60 80 L60 65" opacity="0.4" />
            </svg>
            <h1 class="title-kor">키리고</h1>
            <p style="letter-spacing: 3px; font-size: 10px; margin-top: 10px; opacity: 0.5;">WISH RECORD SYSTEM</p>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app">
        <div id="video-container">
            <video id="webcam" autoplay muted playsinline></video>
            <div class="ui-overlay">
                <div class="rec-info" id="rec-info">
                    <div class="red-dot"></div>
                    <span class="timer" id="timer">00:00</span>
                </div>
                <div class="controls">
                    <button class="record-btn" id="record-btn">
                        <div class="inner-circle"></div>
                    </button>
                    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 1px;">HOLD TO REQUEST</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран "Загрузки" -->
    <div id="upload">
        <p style="letter-spacing: 5px; font-weight: 300; font-size: 14px;">PROCESSING WISH...</p>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        const video = document.getElementById('webcam');
        const btn = document.getElementById('record-btn');
        const recInfo = document.getElementById('rec-info');
        const timerText = document.getElementById('timer');
        const uploadScreen = document.getElementById('upload');
        const fill = document.getElementById('fill');

        let isRecording = false;
        let timeLeft = 50;
        let timerInterval;

        // Инициализация камеры
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: true 
                });
                video.srcObject = stream;
                
                // Убираем сплэш через 3.5 секунды
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        app.style.display = 'flex';
                    }, 1000);
                }, 3500);
            } catch (err) {
                alert("Ошибка: Кириго нужен доступ к камере.");
            }
        }

        function updateTimer() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerText.innerText = `00:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) stopRecording();
            timeLeft--;
        }

        function startRecording() {
            if (isRecording) return;
            isRecording = true;
            timeLeft = 50;
            btn.classList.add('active');
            recInfo.style.opacity = '1';
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            clearInterval(timerInterval);
            btn.classList.remove('active');
            recInfo.style.opacity = '0';
            
            // Симуляция загрузки
            app.style.display = 'none';
            uploadScreen.style.display = 'flex';
            fill.classList.add('animate-load');

            setTimeout(() => {
                alert("ВАШЕ ЖЕЛАНИЕ ПРИНЯТО. ОЖИДАЙТЕ.");
                location.reload(); // Перезагрузка для нового желания
            }, 3500);
        }

        // Обработка нажатий (для ПК и телефонов)
        btn.addEventListener('mousedown', startRecording);
        window.addEventListener('mouseup', stopRecording);

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        window.addEventListener('touchend', stopRecording);

        // Запуск
        startCamera();
    </script>
</body>
</html>
